<!DOCTYPE html>
<html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CreditBook — Offline</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f4ff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:white; border-radius:24px; padding:40px 32px; text-align:center; max-width:340px; box-shadow:0 8px 40px rgba(26,79,214,.12); }
  .ico  { font-size:56px; margin-bottom:16px; }
  h1    { font-size:22px; font-weight:800; color:#1a1d2e; margin-bottom:8px; }
  p     { font-size:14px; color:#6b7280; line-height:1.6; margin-bottom:24px; }
  .btn  { display:inline-block; background:linear-gradient(135deg,#1a4fd6,#0e2a8a); color:white; padding:13px 28px; border-radius:50px; font-size:14px; font-weight:700; text-decoration:none; cursor:pointer; border:none; font-family:inherit; }
</style>
</head>
<body>
<div class="card">
  <div class="ico">📴</div>
  <h1>You're Offline</h1>
  <p>No internet connection. Open the CreditBook app to continue working — your changes will sync automatically when you're back online.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body></html>
